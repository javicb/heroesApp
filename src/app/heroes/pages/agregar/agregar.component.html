<h1>
  {{ (heroe.id) ? 'Editar' : 'Nuevo' }}
  Héroe
  <small>{{heroe.superhero}}</small>
</h1>

<div fxLayout="row" fxLayoutGap="40px" fxLayout.xs="column">
  <div fxFlex="50" fxLayout="column">

    <div fxLayout="row" fxLayout.xs="column" fxLayoutGap="20px">
      <mat-form-field fxFlex="100">
        <mat-label>Super Héroe</mat-label>
        <input matInput type="text" [(ngModel)]="heroe.superhero" required>
      </mat-form-field>

      <mat-form-field fxFlex="100">
        <mat-label>Alter Ego</mat-label>
        <input matInput type="text" [(ngModel)]="heroe.alter_ego" required>
      </mat-form-field>
    </div>

    <mat-form-field>
      <mat-label>Primera aparición</mat-label>
      <input matInput type="text" [(ngModel)]="heroe.first_appearance" required>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Personajes</mat-label>
      <input matInput type="text" [(ngModel)]="heroe.characters" required>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Publicado por</mat-label>
      <mat-select required [(ngModel)]="heroe.publisher">
        <mat-option *ngFor="let item of published" [value]="item.id">
          {{item.desc}}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Foto url</mat-label>
      <input matInput type="url" required [(ngModel)]="heroe.alt_img" required>
    </mat-form-field>

    <br>

    <div fxLayout>
      <button mat-raised-button color="primary" (click)="guardar()">
        <mat-icon>edit</mat-icon>
        {{ (heroe.id) ? 'Actualizar' : 'Crear' }}
      </button>

      <span class="spacer"></span>

      <button mat-raised-button color="warn" *ngIf="heroe.id" (click)="borrar()">
        <mat-icon>remove</mat-icon>
        Borrar
      </button>
    </div>

  </div>
  <div fxFlex="50">
    <img [src]="heroe | imagen" alt="heroe imagen" />
  </div>
</div>
